services:
  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8004:8004"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - VITE_API_URL=http://127.0.0.1:8004
    depends_on:
      - api
    restart: unless-stopped
